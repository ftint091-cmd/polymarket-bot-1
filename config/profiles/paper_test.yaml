# Paper test profile - for smoke testing and CI
execution_mode: paper
cycle_interval_seconds: 1
markets_per_cycle: 3
paper_capital: 10000.0

sizing:
  base_size: 10.0
  min_size: 1.0
  max_size: 100.0

decision:
  gate:
    min_signals: 1
    min_confidence: 0.10

risk:
  max_position_pct: 0.10
  max_total_exposure_pct: 0.50
  min_capital_reserve_pct: 0.05
